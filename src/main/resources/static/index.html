<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetGuard - Sign In</title>
  <meta name="description" content="Sign in to the NetGuard Firewall Management System.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="login-wrapper">
    <!-- Header/Logo area -->
    <header class="logo-area">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/O/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shield-icon">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          <path d="m9 12 2 2 4-4"></path>
        </svg>
      </div>
      <h1 class="brand-name">NetGuard</h1>
      <p class="brand-subtitle">Firewall Management System</p>
    </header>

    <!-- Main Login Card -->
    <div class="login-card">
      <div class="card-content">
        <h2 class="card-title">Sign in to your account</h2>
        
        <form class="login-form" id="loginForm">
          <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" required>
          </div>
          
          <div class="input-group">
            <div class="label-row">
              <label for="password">Password</label>
              <a href="#" class="forgot-password">Forgot Password?</a>
            </div>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
          
          <div class="checkbox-group">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Remember this device for 30 days</label>
          </div>
          
          <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div class="divider">
          <span>OR CONTINUE WITH</span>
        </div>

        <button type="button" class="btn-sso">
          <svg class="sso-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Sign in with Single Sign-On (SSO)
        </button>
      </div>
      
      <!-- Status Footer attached to bottom of card -->
      <div class="status-footer">
        <span class="status-dot"></span>
        <span class="status-text">All systems operational. Security status: High.</span>
      </div>
    </div>

    <!-- Page Footer -->
    <footer class="page-footer">
      <p>&copy; 2023 NetGuard Cybersecurity Inc. All rights reserved.</p>
      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Security Standards</a>
        <a href="#">Help Desk</a>
      </div>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
